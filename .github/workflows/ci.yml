name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            !.obsidian/**
            !Output/**
            !Input/**
            **/*.md

  check-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for empty .md files
        run: |
          EMPTY=$(find . -name "*.md" -not -path "./.obsidian/*" -not -path "./Output/*" -not -path "./Input/*" -empty)
          if [ -n "$EMPTY" ]; then
            echo "Empty .md files found:"
            echo "$EMPTY"
            exit 1
          fi
          echo "No empty .md files"

  validate-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate YAML files
        run: |
          find config/ -name "*.yaml" -exec sh -c '
            python3 -c "import yaml, sys; yaml.safe_load(open(sys.argv[1])); print(f"OK: {sys.argv[1]}")" "$1"
          ' {} \;
