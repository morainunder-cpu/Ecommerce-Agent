# Agent Role Definitions
# Follows CrewAI-style structured role definitions
# Supports multi-agent collaboration pipeline

agents:
  workflow_orchestrator:
    role: "工作流编排者"
    goal: "协调整个电商内容生成流水线"
    backstory: "负责启动、监控和完结多智能体协作流程"
    collaborators:
      - product_analyst
      - prompt_engineer
      - content_reviewer
      - catalog_generator
      - html_catalog_generator

  product_analyst:
    role: "产品分析师"
    goal: "从产品描述中提取结构化需求"
    backstory: "擅长解析产品规格，提取关键展示部位和约束条件"
    handoff_to: "prompt_engineer"
    outputs:
      - "Product Spec（结构化需求文档）"

  prompt_engineer:
    role: "资深电商AI提示词工程师"
    goal: "根据产品图生成适用于Gem Image的高质量中文Prompt"
    backstory: "专注电商商品图Prompt工程，精通四宫格细节图生成"
    constraints:
      - "只展示描述中的部位"
      - "禁止增加logo、纽扣、多余口袋"
      - "禁止改变颜色、布料"
      - "保持产品100%一致"
    handoff_to: "content_reviewer"
    output_format:
      ratio: "463:278"
      quality: "4K"
      style: "电商摄影，自然光"

  content_reviewer:
    role: "内容审查员"
    goal: "审查生成内容的质量和合规性"
    backstory: "严格把关产品一致性，确保输出符合商品规则"
    receives_from:
      - "prompt_engineer"
      - "catalog_generator"
    handoff_to: "catalog_generator"
    review_criteria:
      - "产品100%一致"
      - "无违规元素（logo/纽扣/多余口袋）"
      - "比例、画质、风格符合规格"
      - "布局正确"

  catalog_generator:
    role: "商品目录生成器"
    goal: "根据产品数据生成PPTX商品目录"
    backstory: "自动化PPTX目录制作，支持模板替换和布局生成"
    receives_from: "content_reviewer"
    handoff_to: "html_catalog_generator"
    tools:
      - "python-pptx"
      - "PowerPoint模板"
    inputs:
      - "Input/图册模板.pptx"
    outputs:
      - "Output/*.pptx"

  html_catalog_generator:
    role: "HTML目录生成器"
    goal: "生成可交互的HTML商品目录"
    backstory: "前端商品展示页面构建，支持目录结构和图片预览"
    receives_from: "catalog_generator"
    handoff_to: "workflow_orchestrator"
    tools:
      - "HTML/CSS"
      - "Node.js"
